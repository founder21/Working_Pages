	<script src="js/app.min.js?_v=20260302191615"></script>
	<!-- переключение темы -->
	<script>
		(function() {
			const htmlElement = document.documentElement;

			// 1. Мгновенная установка темы (до отрисовки DOM)
			const savedTheme = localStorage.getItem('theme');
			const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
			const initialTheme = savedTheme || (systemDark ? 'dark' : 'light');

			htmlElement.setAttribute('data-theme', initialTheme);

			// 2. Логика работы переключателя
			document.addEventListener('DOMContentLoaded', () => {
				const themeToggle = document.querySelector('.switch'); // Новый класс .switch

				if (themeToggle) {
					// Синхронизируем положение чекбокса с текущей темой
					// Если тема light — чекбокс нажат (Checked)
					themeToggle.checked = (htmlElement.getAttribute('data-theme') === 'light');

					themeToggle.addEventListener('change', () => {
						const newTheme = themeToggle.checked ? 'light' : 'dark';

						htmlElement.setAttribute('data-theme', newTheme);
						localStorage.setItem('theme', newTheme);
					});
				}
			});
		})();
	</script>
	<!-- переключение бокоового меню -->
	<script>
		const btn = document.querySelector('.dashboard__btn-scroll-dashboard');
		const wrapper = document.querySelector('.wrapper');

		// 1. Проверяем сохраненное состояние в памяти браузера при загрузке
		if (localStorage.getItem('sidebar-collapsed') === 'true') {
			wrapper.classList.add('is-collapsed');
		}

		btn.addEventListener('click', () => {
			// 2. Переключаем класс
			wrapper.classList.toggle('is-collapsed');

			// 3. Сохраняем текущее состояние (true или false)
			const isCollapsed = wrapper.classList.contains('is-collapsed');
			localStorage.setItem('sidebar-collapsed', isCollapsed);
		});
	</script>

</body>
